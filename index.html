<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VWall</title>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@7/dist/pixi.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="header">
  <div class="header-left">
    <label>Count: <input id="countSlider" type="range" min="10" max="20000" value="1000" step="50" /><span id="countVal">1000</span></label>
    <label class="sort-label">Sort
      <select id="sortMode" title="Layout order on the wall">
        <option value="mixed">Mixed</option>
        <option value="type">Media type</option>
        <option value="resolution">Resolution ↓</option>
        <option value="resolution-asc">Resolution ↑</option>
        <option value="date">Date published ↓</option>
        <option value="date-asc">Date published ↑</option>
        <option value="exif">EXIF / camera</option>
        <option value="format">Format / codec</option>
        <option value="source">Source / provider</option>
        <option value="cdn">CDN / region</option>
      </select>
    </label>
    <div id="mediaFilters" class="media-filters" title="Show only selected media types"></div>
  </div>
  <div class="header-right">
    <button type="button" id="perf" class="perf-compact" aria-expanded="true" aria-controls="metricsPanel" title="Click to show or hide metrics panel">—</button>
  </div>
</div>

<aside id="metricsPanel" aria-label="Performance metrics">
  <div class="metrics-title">Metrics <button type="button" id="metricsCollapse" class="metrics-collapse-btn" aria-label="Collapse metrics panel">▾</button></div>
  <div class="metric-row"><span>FPS</span><strong id="mFps">—</strong></div>
  <div class="metric-row"><span>Memory</span><strong id="mMem">—</strong></div>
  <div class="metric-row"><span>Loaded</span><strong id="mLoad">—</strong></div>
  <div class="metric-row"><span>Queue</span><strong id="mQueue">—</strong></div>
  <div class="metric-row"><span>Types</span><strong id="mTypes" class="metric-wide">—</strong></div>
  <div class="metric-row"><span>Buffer est.</span><strong id="mBuffer" class="metric-wide">—</strong></div>
  <div class="metric-row"><span>Probe</span><strong id="mProbe" class="metric-wide">—</strong></div>
  <div class="metric-row"><span>Cache</span><strong id="mCache" class="metric-wide">—</strong></div>
  <p class="metrics-hint">Run <code>mustream probe-serve</code> for ffprobe / EXIF. Meta filter searches probed tags.</p>
</aside>

<footer>
  <input id="search" type="text" placeholder="Search media…" />
  <input id="metaSearch" type="text" placeholder="exif:canon codec:h264 dims:1920x1080" title="Filter loaded items by metadata (Bridge-style)" />
  <button id="searchBtn" onclick="runSearch()">Go</button>
  <span id="searchStatus"></span>
  <button id="layoutBtn" onclick="toggleLayout()">Sphere</button>
  <button id="blurBtn" onclick="toggleBlur()">Blur: OFF</button>
  <button id="blendBtn" onclick="toggleBlend()">Blend: OFF</button>
  <button onclick="reseed()">Reseed</button>
</footer>

<div id="drawer"></div>

<video id="video" controls style="display:none; width:100%; height:100%;"></video>
<canvas id="c"></canvas>

<script src="session.js"></script>
<script src="sort.js"></script>
<script src="catalog.js"></script>
<script src="analyzers.js"></script>
<script src="probe-pool.js"></script>
<script src="metadata.js"></script>
<script src="metrics.js"></script>
<script src="app.js"></script>
</body>
</html>
